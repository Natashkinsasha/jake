# =============================================
# Scenario 1: Beginner casual chat
# Tests: character consistency, short responses, context memory
# =============================================

- vars:
    system: file://prompts/greeting-system.txt
    message: "Hi Jake! I goed to the park yesterday"
  options:
    storeOutputAs: beginner_turn1
  metadata:
    conversationId: beginner
  assert:
    - type: javascript
      value: "output.length < 500"
    - type: not-contains
      value: "AI"
    - type: not-contains
      value: "language model"
    - type: llm-rubric
      value: |
        Jake responds naturally to the student mentioning going to the park.
        Jake stays in character as a friendly Australian English tutor.
        Jake may naturally address the grammar error ("goed" → "went") or ask a follow-up about the park.
        Inline grammar corrections (even in italics or parentheses) are fine and expected — they don't count as "breaking character" or "lecturing."

- vars:
    system: file://prompts/greeting-system.txt
    message: "We play football and then eated ice cream"
  options:
    storeOutputAs: beginner_turn2
  metadata:
    conversationId: beginner
  assert:
    - type: javascript
      value: "output.length < 500"
    - type: not-contains
      value: "AI"
    - type: not-contains
      value: "language model"
    - type: llm-rubric
      value: |
        Jake stays in character as a friendly Australian tutor.
        Jake engages with the content (football, ice cream) naturally.
        Inline grammar corrections (even in italics or parentheses) are fine and expected — they don't count as "breaking character" or "lecturing."

- vars:
    system: file://prompts/greeting-system.txt
    message: "Do you like football too?"
  metadata:
    conversationId: beginner
  assert:
    - type: javascript
      value: "output.length < 500"
    - type: not-contains
      value: "AI"
    - type: not-contains
      value: "language model"
    - type: llm-rubric
      value: |
        Jake responds to the question about football in character.
        Jake asks a follow-up question or continues the conversation naturally.
        The conversation flows logically from the prior discussion about football.

# =============================================
# Scenario 2: Correction flow
# Tests: error correction, positive reinforcement, topic suggestion
# =============================================

- vars:
    system: file://prompts/greeting-system.txt
    message: "I have work here for two years"
  options:
    storeOutputAs: correction_turn1
  metadata:
    conversationId: correction
  assert:
    - type: javascript
      value: "output.length < 500"
    - type: not-contains
      value: "AI"
    - type: not-contains
      value: "language model"
    - type: llm-rubric
      value: |
        Jake naturally addresses the grammar error ("have work" should be "have worked" or "have been working").
        The correction follows a natural, conversational style (not a formal grammar lecture).
        Jake stays in character as a friendly tutor.

- vars:
    system: file://prompts/greeting-system.txt
    message: "Oh right, I have worked here for two years. Thanks!"
  options:
    storeOutputAs: correction_turn2
  metadata:
    conversationId: correction
  assert:
    - type: javascript
      value: "output.length < 500"
    - type: not-contains
      value: "AI"
    - type: not-contains
      value: "language model"
    - type: llm-rubric
      value: |
        Jake gives positive reinforcement for the student's corrected sentence.
        Response is encouraging and natural, not overly enthusiastic or formal.
        Jake stays in character as a friendly tutor who is genuinely curious about the student's life.
        Asking follow-up questions about the student's work, hobbies, or life is expected and IN character — Jake is supposed to be like a close friend.

- vars:
    system: file://prompts/greeting-system.txt
    message: "What else should I practice?"
  metadata:
    conversationId: correction
  assert:
    - type: javascript
      value: "output.length < 500"
    - type: not-contains
      value: "AI"
    - type: not-contains
      value: "language model"
    - type: llm-rubric
      value: |
        Jake suggests a grammar topic related to the student's weak areas (present_perfect or conditionals, as listed in the system prompt).
        The suggestion feels natural and conversational, not like reading from a curriculum.
        Jake stays in character.

# =============================================
# Scenario 3: Exercise interaction
# Tests: exercise format, feedback, learning focus reference
# =============================================

- vars:
    system: file://prompts/greeting-system.txt
    message: "Can you give me an exercise about past tense?"
  options:
    storeOutputAs: exercise_turn1
  metadata:
    conversationId: exercise
  assert:
    - type: javascript
      value: "output.length < 800"
    - type: not-contains
      value: "AI"
    - type: not-contains
      value: "language model"
    - type: llm-rubric
      value: |
        Jake responds to the exercise request in one of these acceptable ways:
        1. Provides an exercise using the <exercise> JSON tag format
        2. Naturally leads into an exercise through conversation
        3. Redirects to a different grammar topic (like present_perfect) before giving an exercise — this is valid because the system prompt tells Jake to prioritize certain topics
        Any of these responses is a PASS. Jake stays in character as a friendly tutor.

- vars:
    system: file://prompts/greeting-system.txt
    message: "I think the answer is went"
  options:
    storeOutputAs: exercise_turn2
  metadata:
    conversationId: exercise
  assert:
    - type: javascript
      value: "output.length < 500"
    - type: not-contains
      value: "AI"
    - type: not-contains
      value: "language model"
    - type: llm-rubric
      value: |
        Jake provides feedback on the student's answer.
        The feedback is constructive — either confirming correctness, gently correcting, or guiding toward the right answer.
        Jake stays in character. Note: Jake's character is a friendly, laid-back Australian tutor — a short, direct response with gentle correction IS in character. He doesn't need to use slang or explicit personality markers in every message.

- vars:
    system: file://prompts/greeting-system.txt
    message: "What other topics should I practice?"
  metadata:
    conversationId: exercise
  assert:
    - type: javascript
      value: "output.length < 500"
    - type: not-contains
      value: "AI"
    - type: not-contains
      value: "language model"
    - type: llm-rubric
      value: |
        Jake suggests topics related to the student's learning focus (present_perfect, conditionals, or other relevant grammar areas).
        The suggestion is natural and conversational.
        Jake stays in character.

# =============================================
# Scenario 4: Matching exercise format
# Tests: uses <exercise> tag (not plain text A/B/C), correct XML structure, pair count
# =============================================

- vars:
    system: file://prompts/greeting-system.txt
    message: "Hey Jake, I learned some new words recently — overwhelming, reluctant, resilient, and accomplish. Can you give me a matching exercise?"
  options:
    storeOutputAs: matching_turn1
  metadata:
    conversationId: matching
  assert:
    - type: javascript
      value: "output.length < 1200"
    - type: contains
      value: "<exercise type=\"matching\">"
    - type: contains
      value: "</exercise>"
    - type: contains
      value: "<pair word=\""
    - type: javascript
      value: "(output.match(/<pair\\s+word=/g) || []).length >= 3"
      metric: pair_count
    - type: not-contains
      value: "AI"
    - type: not-contains
      value: "language model"
    - type: javascript
      value: "!(/\\b[A-D]\\)\\s/.test(output))"
      metric: no_abc_options
    - type: llm-rubric
      value: |
        Jake says something brief and friendly before providing the exercise.
        The exercise uses the <exercise type="matching"> XML tag with <pair word="..." definition="..."/> entries.
        Jake does NOT use plain text options like "A) ... B) ... C) ..." — all exercises must use the <exercise> tag format.
        Jake stays in character.

- vars:
    system: file://prompts/greeting-system.txt
    message: "Let's do a quick vocabulary quiz"
  options:
    storeOutputAs: matching_turn2
  metadata:
    conversationId: matching
  assert:
    - type: javascript
      value: "output.length < 1200"
    - type: contains
      value: "<exercise type=\"matching\">"
    - type: contains
      value: "</exercise>"
    - type: javascript
      value: "(output.match(/<pair\\s+word=/g) || []).length >= 3"
      metric: pair_count
    - type: javascript
      value: "!(/\\b[A-D]\\)\\s/.test(output))"
      metric: no_abc_options
    - type: llm-rubric
      value: |
        When a student asks for a "quiz" or "vocabulary quiz", Jake uses the <exercise type="matching"> tag format.
        Jake does NOT write plain text questions, numbered lists, or A/B/C options.
        The exercise contains at least 3 word-definition pairs.
        Jake stays in character.

- vars:
    system: file://prompts/greeting-system.txt
    message: "Can you test me on the words we discussed?"
  metadata:
    conversationId: matching
  assert:
    - type: javascript
      value: "output.length < 1200"
    - type: contains
      value: "<exercise type=\"matching\">"
    - type: contains
      value: "</exercise>"
    - type: javascript
      value: "(output.match(/<pair\\s+word=/g) || []).length >= 3"
      metric: pair_count
    - type: javascript
      value: "!(/\\b[A-D]\\)\\s/.test(output))"
      metric: no_abc_options
    - type: llm-rubric
      value: |
        Jake responds to the request to be tested on words by providing a matching exercise.
        The exercise uses <exercise type="matching"> tag with <pair/> entries.
        Jake does NOT fall back to plain text quiz formats (A/B/C, numbered options, fill-in-the-blank text).
        The pairs reference words from the conversation context.
        Jake stays in character.
