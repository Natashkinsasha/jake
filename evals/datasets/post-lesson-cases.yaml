- description: "Post-lesson — beginner with grammar errors"
  vars:
    system: file://prompts/post-lesson-system.txt
    message: |
      tutor: Hey Alex! How's it going today?
      user: Hi Jake! I good, thanks. Yesterday I goed to the park with my friend.
      tutor: Nice one! So you went to the park — sounds like a good afternoon. What did you guys get up to?
      user: We play football and then we eated ice cream. It was very fun!
      tutor: Haha, love it! So you played football and ate ice cream — perfect combo.
      user: Yes! I like football very much. I play every weekend.
      tutor: That's awesome. Do you play on a team or just with friends?
      user: Just with friends. We don't have team. Maybe one day.
      tutor: You should go for it! Right, let's wrap up — today we chatted about your weekend and worked on past tense. You're getting so much better!
  assert:
    - type: is-json
    - type: javascript
      value: |
        const json = JSON.parse(output);
        return Array.isArray(json.topics) && json.topics.length > 0;
    - type: javascript
      value: |
        const json = JSON.parse(output);
        return Array.isArray(json.errorsFound) && json.errorsFound.length >= 2;
    - type: javascript
      value: |
        const json = JSON.parse(output);
        return typeof json.summary === 'string' && json.summary.length > 20;
    - type: javascript
      value: |
        const json = JSON.parse(output);
        return typeof json.emotionalSummary === 'string';
    - type: javascript
      value: |
        const json = JSON.parse(output);
        return Array.isArray(json.suggestedNextTopics) && json.suggestedNextTopics.length > 0;
    - type: llm-rubric
      value: >
        The JSON summary accurately reflects the conversation. Errors like "goed"→"went",
        "eated"→"ate", "play"→"played" should be identified. Topics should include
        past tense. The emotional summary should note the student was positive/happy.

- description: "Post-lesson — advanced free conversation"
  vars:
    system: file://prompts/post-lesson-system.txt
    message: |
      tutor: Hey Alex! What's on your mind today?
      user: Hey Jake! I've been thinking about artificial intelligence lately. Do you think it will replace most jobs?
      tutor: Ooh, big question! I think it'll change a lot of jobs but not replace everything. What do you think?
      user: I believe that AI will augment human capabilities rather than replace them entirely. However, there's a significant risk for routine tasks.
      tutor: Well said! Your English is really solid there. "Augment" — great word choice. Any particular industry you're worried about?
      user: Transportation, I think. Self-driving trucks could eliminate millions of jobs. Nevertheless, new roles will emerge.
      tutor: Spot on. You used "nevertheless" perfectly there. Alright, great chat today — your English is seriously impressive!
  assert:
    - type: is-json
    - type: javascript
      value: |
        const json = JSON.parse(output);
        return typeof json.summary === 'string' && json.summary.length > 20;
    - type: javascript
      value: |
        const json = JSON.parse(output);
        return Array.isArray(json.newWords) && json.newWords.length >= 1;
    - type: javascript
      value: |
        const json = JSON.parse(output);
        return json.levelAssessment === null || ['A1','A2','B1','B2','C1','C2'].includes(json.levelAssessment);
    - type: llm-rubric
      value: >
        Summary should reflect an advanced-level conversation about AI and jobs.
        Few or no errors expected. Level assessment should be B2 or higher.
        Words like "augment", "nevertheless" should appear in newWords.

- description: "Post-lesson — mixed exercise lesson"
  vars:
    system: file://prompts/post-lesson-system.txt
    message: |
      tutor: Hey Alex! Ready to work on present perfect today?
      user: Yes, I think so. I never really understand this tense.
      tutor: No problem! So present perfect is for things that started in the past and connect to now. Like "I have lived in Berlin for 3 years." Try making a sentence?
      user: I have work at my company for two years.
      tutor: Almost! "I have worked at my company for two years." You need the past participle — worked, not work.
      user: Ah, I have worked at my company for two years. Got it!
      tutor: Perfect! Now here's a quick exercise for you.
      user: I have visited Japan last year.
      tutor: Careful — "last year" is a specific time, so we use past simple: "I visited Japan last year." Present perfect is for unspecified time: "I have visited Japan."
      user: Oh right! So "I have been to Japan" is correct but "I have been to Japan last year" is wrong?
      tutor: Exactly! You're getting it. Great progress today!
  assert:
    - type: is-json
    - type: javascript
      value: |
        const json = JSON.parse(output);
        return Array.isArray(json.topics) && json.topics.some(t => t.toLowerCase().includes('present perfect') || t.toLowerCase().includes('present_perfect'));
    - type: javascript
      value: |
        const json = JSON.parse(output);
        return Array.isArray(json.errorsFound) && json.errorsFound.length >= 1;
    - type: llm-rubric
      value: >
        Summary should focus on present perfect tense practice. Errors like
        "have work"→"have worked" should be caught. The student showed
        progress during the lesson. Suggested topics should build on present perfect.

