name: Deploy
on:
  push:
    branches: [main]

env:
  REGISTRY: registry.digitalocean.com/go-code-challenge
  API_IMAGE: registry.digitalocean.com/go-code-challenge/jake-api
  WEB_IMAGE: registry.digitalocean.com/go-code-challenge/jake-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - run: doctl registry login --expiry-seconds 600
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.API_IMAGE }}:${{ github.sha }},${{ env.API_IMAGE }}:latest
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.WEB_IMAGE }}:${{ github.sha }},${{ env.WEB_IMAGE }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - run: doctl kubernetes cluster kubeconfig save ${{ secrets.K8S_CLUSTER_ID }}
      - run: |
          cd infra/k8s/overlays/prod
          kustomize edit set image \
            registry.digitalocean.com/go-code-challenge/jake-api=${{ env.API_IMAGE }}:${{ github.sha }} \
            registry.digitalocean.com/go-code-challenge/jake-web=${{ env.WEB_IMAGE }}:${{ github.sha }}
          kubectl apply -k .
      - run: |
          kubectl rollout status deployment/api -n jake --timeout=300s
          kubectl rollout status deployment/web -n jake --timeout=300s
          kubectl rollout status deployment/worker -n jake --timeout=300s
