name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/natashkinsasha/jake-api
  WEB_IMAGE: ghcr.io/natashkinsasha/jake-web

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm type-check

  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @jake/api test

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @jake/web test

  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    needs: [checks, test-api, test-web, build-api, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.API_IMAGE }}:latest,${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=api
      - name: Push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.WEB_IMAGE }}:latest,${{ env.WEB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=web
      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/root/jake/"
          overwrite: true
      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: GITHUB_TOKEN,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,JWT_SECRET,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,ANTHROPIC_API_KEY,DEEPGRAM_API_KEY,ELEVENLABS_API_KEY,NEXTAUTH_SECRET,FRONTEND_URL,NEXTAUTH_URL,OPENAI_API_KEY
          script: |
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u github --password-stdin
            cd /root/jake
            cat > .env <<EOF
            PORT=4000
            NODE_ENV=production
            DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
            REDIS_URL=redis://redis:6379
            JWT_SECRET=${JWT_SECRET}
            GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
            GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
            FRONTEND_URL=${FRONTEND_URL}
            ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
            DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
            ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
            OPENAI_API_KEY=${OPENAI_API_KEY}
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_DB=${POSTGRES_DB}
            NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
            NEXTAUTH_URL=${NEXTAUTH_URL}
            EOF
            docker compose -f docker-compose.prod.yml pull api web
            docker compose -f docker-compose.prod.yml run --rm api node dist/migrate.js || { echo "Migration failed! Aborting deploy."; exit 1; }

            # Save current image digests for rollback
            API_OLD=$(docker inspect --format='{{.Image}}' jake-api-1 2>/dev/null || echo "")
            WEB_OLD=$(docker inspect --format='{{.Image}}' jake-web-1 2>/dev/null || echo "")

            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml restart nginx

            # Wait for API health check
            echo "Waiting for API health check..."
            HEALTHY=false
            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' jake-api-1 2>/dev/null || echo "unknown")
              echo "  Attempt $i/12: $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                HEALTHY=true
                break
              fi
              sleep 10
            done

            if [ "$HEALTHY" != "true" ]; then
              echo "API health check failed! Rolling back..."
              docker compose -f docker-compose.prod.yml logs api --tail 50
              if [ -n "$API_OLD" ]; then
                docker tag "$API_OLD" ghcr.io/natashkinsasha/jake-api:latest 2>/dev/null || true
                docker tag "$WEB_OLD" ghcr.io/natashkinsasha/jake-web:latest 2>/dev/null || true
                docker compose -f docker-compose.prod.yml up -d
                docker compose -f docker-compose.prod.yml restart nginx
              fi
              exit 1
            fi

            echo "API is healthy!"
            docker image prune -f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
