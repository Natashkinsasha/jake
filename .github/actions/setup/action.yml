name: Setup Node & pnpm
description: Setup pnpm, Node 22, install dependencies (checkout must be done before this action)

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: pnpm
    - run: pnpm install --frozen-lockfile
      shell: bash
